<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eletromagnetismo na Prática — Treinamento Interativo V4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1420; --panel:#161F2E; --panel2:#1C2839; --line:#2A3A50;
  --copper:#D08A4E; --copper-hi:#E8A968; --cyan:#5FD4E8;
  --north:#E86A5D; --south:#5D8DE8; --heat:#FF6B3D;
  --txt:#E8E4DC; --txt-dim:#9AA7B8;
  --ok:#6FCF97; --bad:#EB5757;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Sans',system-ui,sans-serif;line-height:1.55}
h1,h2,h3,.brand{font-family:'Space Grotesk',sans-serif}
header{padding:22px 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.brand{font-size:1.25rem;font-weight:700;letter-spacing:.02em}
.brand b{color:var(--copper)}
.badge{font-size:.7rem;border:1px solid var(--copper);color:var(--copper);border-radius:4px;padding:2px 7px;letter-spacing:.08em}
nav{display:flex;gap:6px;overflow-x:auto;padding:12px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(14,20,32,.95);backdrop-filter:blur(6px);z-index:10}
nav button{flex:0 0 auto;background:var(--panel);color:var(--txt-dim);border:1px solid var(--line);border-radius:6px;padding:8px 12px;font-family:'Space Grotesk';font-size:.8rem;cursor:pointer;transition:.15s}
nav button.active{background:var(--copper);color:#141414;border-color:var(--copper);font-weight:600}
nav button.done:not(.active){border-color:var(--copper);color:var(--copper)}
main{max-width:820px;margin:0 auto;padding:24px 16px 80px}
section.mod{display:none;animation:fade .3s ease}
section.mod.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.eyebrow{color:var(--cyan);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px}
h2{font-size:1.55rem;margin-bottom:14px;line-height:1.2}
p{margin-bottom:12px;color:#CDD5DF}
p b,li b{color:var(--txt)}
.key{background:var(--panel);border-left:3px solid var(--copper);padding:12px 14px;border-radius:0 8px 8px 0;margin:16px 0;font-size:.95rem}
.key .t{color:var(--copper-hi);font-weight:600;font-family:'Space Grotesk';font-size:.8rem;letter-spacing:.1em;display:block;margin-bottom:4px}
.lab{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin:20px 0}
.lab h3{font-size:.85rem;color:var(--cyan);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
canvas{width:100%;border-radius:8px;background:#0A0F18;display:block}
.ctrl{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-top:12px}
.ctrl label{font-size:.8rem;color:var(--txt-dim);display:flex;flex-direction:column;gap:4px;min-width:150px;flex:1}
input[type=range]{accent-color:var(--copper);width:100%}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:8px 14px;font-family:'Space Grotesk';font-size:.82rem;cursor:pointer}
.btn:hover{border-color:var(--copper);color:var(--copper-hi)}
.btn.primary{background:var(--copper);color:#141414;border-color:var(--copper);font-weight:600}
.readout{font-family:'Space Grotesk';color:var(--cyan);font-size:.85rem}
table{width:100%;border-collapse:collapse;font-size:.85rem;margin:16px 0}
th,td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
th{background:var(--panel2);color:var(--copper-hi);font-family:'Space Grotesk';font-weight:500}
td:first-child{color:var(--cyan);white-space:nowrap}
ul{margin:0 0 14px 20px}
li{margin-bottom:6px;color:#CDD5DF}
.navrow{display:flex;justify-content:space-between;margin-top:28px;gap:10px}
.quiz-q{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px}
.quiz-q .qt{font-weight:600;margin-bottom:10px}
.opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:9px 12px;margin-bottom:7px;cursor:pointer;font-size:.9rem}
.opt:hover{border-color:var(--cyan)}
.opt.correct{border-color:var(--ok);background:rgba(111,207,151,.12)}
.opt.wrong{border-color:var(--bad);background:rgba(235,87,87,.10)}
.expl{font-size:.85rem;color:var(--txt-dim);margin-top:8px;display:none}
.score{font-family:'Space Grotesk';font-size:1.2rem;color:var(--copper-hi);margin-top:10px}
@media(prefers-reduced-motion:reduce){.mod{animation:none}}
</style>
</head>
<body>
<header>
  <span class="brand">⚡ Eletromagnetismo <b>na Prática</b></span>
  <span class="badge">V4</span>
  <span style="font-size:.78rem;color:var(--txt-dim)">Do campo magnético ao motor e ao forno de indução — sem sofrimento matemático</span>
</header>

<nav id="nav"></nav>
<main id="main"></main>

<script>
'use strict';
/* ============ NAVEGAÇÃO ============ */
const MODS=[
 {id:'m1',nav:'1 · Campos',title:'Campo magnético: a base de tudo',eyebrow:'Módulo 1 — Fundamento'},
 {id:'m2',nav:'2 · Força',title:'Força sobre o condutor: o princípio do motor',eyebrow:'Módulo 2 — Ação motora'},
 {id:'m3',nav:'3 · Indução',title:'Indução eletromagnética: Faraday e Lenz',eyebrow:'Módulo 3 — Ação geradora'},
 {id:'m4',nav:'4 · Motor CC',title:'Motor CC: o comutador resolve o problema',eyebrow:'Módulo 4 — Máquinas'},
 {id:'m5',nav:'5 · Motor CA',title:'Motor CA: o campo girante',eyebrow:'Módulo 5 — Máquinas'},
 {id:'m6',nav:'6 · Universal',title:'Motor universal: o híbrido das ferramentas',eyebrow:'Módulo 6 — Máquinas'},
 {id:'m7',nav:'7 · Indução térmica',title:'Forno de indução e aquecimento indutivo',eyebrow:'Módulo 7 — Processos térmicos'},
 {id:'m8',nav:'8 · Quiz',title:'Comparativo final + Quiz',eyebrow:'Módulo 8 — Consolidação'},
];
let current=0; const visited=new Set([0]);
const nav=document.getElementById('nav');
MODS.forEach((m,i)=>{const b=document.createElement('button');b.textContent=m.nav;b.onclick=()=>go(i);nav.appendChild(b);});
function go(i){
  current=i;visited.add(i);
  document.querySelectorAll('nav button').forEach((b,j)=>{b.classList.toggle('active',j===i);b.classList.toggle('done',visited.has(j));});
  document.querySelectorAll('.mod').forEach((s,j)=>s.classList.toggle('show',j===i));
  window.scrollTo({top:0,behavior:'smooth'});
}
window.go=go;

/* ============ CONTEÚDO ============ */
document.getElementById('main').innerHTML=`
<section class="mod" id="m1">
  <div class="eyebrow">${MODS[0].eyebrow}</div><h2>${MODS[0].title}</h2>
  <p>Tudo em máquinas elétricas se resume a <b>duas descobertas do século XIX</b>:</p>
  <ul>
    <li><b>Oersted (1820):</b> corrente elétrica cria campo magnético ao seu redor. Eletricidade → magnetismo.</li>
    <li><b>Faraday (1831):</b> campo magnético <i>variando</i> induz tensão num condutor. Magnetismo → eletricidade.</li>
  </ul>
  <p>Um fio percorrido por corrente gera linhas de campo <b>circulares e concêntricas</b> ao redor dele. O sentido segue a <b>regra da mão direita</b>: polegar no sentido da corrente, dedos curvados mostram o sentido do campo.</p>
  <div class="lab">
    <h3>🧪 Bancada 1 — Campo ao redor de um condutor</h3>
    <canvas id="c1" data-h="260"></canvas>
    <div class="ctrl">
      <label>Intensidade da corrente <input type="range" id="c1i" min="0" max="100" value="55"></label>
      <button class="btn" id="c1flip">Inverter corrente ⇄</button>
      <span class="readout" id="c1r"></span>
    </div>
  </div>
  <p>Enrolando o fio em espiras (bobina/solenoide), os campos de cada volta <b>se somam</b> — a bobina vira um ímã com polo N e S. Coloque um núcleo de ferro dentro e o campo se multiplica centenas de vezes: nasceu o <b>eletroímã</b>, o bloco construtivo de todo motor, contator, solenoide de válvula e freio magnético.</p>
  <div class="key"><span class="t">IDEIA-CHAVE</span>Corrente cria campo. Mais corrente = campo mais forte. Mais espiras = campo mais forte. Núcleo de ferro = campo muito mais forte. Inverteu a corrente? Inverteu os polos.</div>
  <div class="navrow"><span></span><button class="btn primary" onclick="go(1)">Próximo: Força →</button></div>
</section>

<section class="mod" id="m2">
  <div class="eyebrow">${MODS[1].eyebrow}</div><h2>${MODS[1].title}</h2>
  <p>Agora o pulo do gato: coloque um condutor <b>com corrente</b> dentro de um campo magnético <b>externo</b> (entre os polos N e S de um ímã). Os dois campos interagem e surge uma <b>força mecânica</b> empurrando o fio — a força de Lorentz.</p>
  <p>Intuição sem fórmula: de um lado do fio, o campo do ímã e o campo da corrente <b>se somam</b> (região "apertada" de linhas); do outro, <b>se cancelam</b> (região "folgada"). As linhas de campo se comportam como elásticos esticados: o fio é empurrado <b>do lado denso para o lado ralo</b>.</p>
  <div class="lab">
    <h3>🧪 Bancada 2 — Força de Lorentz (F, B, I)</h3>
    <canvas id="c2" data-h="280"></canvas>
    <div class="ctrl">
      <button class="btn" id="c2flipI">Inverter corrente ⇄</button>
      <button class="btn" id="c2flipB">Inverter campo (trocar N↔S)</button>
      <span class="readout" id="c2r"></span>
    </div>
  </div>
  <ul>
    <li>Inverta <b>só a corrente</b> → a força inverte.</li>
    <li>Inverta <b>só o campo</b> → a força inverte.</li>
    <li>Inverta <b>os dois</b> → a força volta ao sentido original. <i>(Guarde isso: é o segredo do motor universal!)</i></li>
  </ul>
  <div class="key"><span class="t">IDEIA-CHAVE</span>Condutor com corrente + campo magnético = força. A força cresce com a corrente, com o campo e com o comprimento do condutor no campo. Por isso motores grandes têm bobinas longas e núcleos robustos.</div>
  <div class="navrow"><button class="btn" onclick="go(0)">← Voltar</button><button class="btn primary" onclick="go(2)">Próximo: Indução →</button></div>
</section>

<section class="mod" id="m3">
  <div class="eyebrow">${MODS[2].eyebrow}</div><h2>${MODS[2].title}</h2>
  <p>O caminho inverso: ao <b>mover</b> um ímã perto de uma bobina, o fluxo magnético que a atravessa <b>varia</b> — e isso <b>induz tensão</b>. Circuito fechado? Circula corrente. É a <b>Lei de Faraday</b>.</p>
  <p>E a <b>Lei de Lenz</b> dá o sentido: a corrente induzida sempre cria um campo que <b>se opõe</b> à variação que a gerou. Aproximou o polo N? A bobina cria um N na cara do ímã para repeli-lo. Afastou? Ela cria um S para segurá-lo. A natureza "resiste à mudança".</p>
  <div class="lab">
    <h3>🧪 Bancada 3 — Arraste o ímã pela bobina</h3>
    <canvas id="c3" data-h="240"></canvas>
    <div class="ctrl">
      <label>Posição do ímã <input type="range" id="c3p" min="0" max="100" value="10"></label>
      <span class="readout" id="c3r">Mova o slider rápido e devagar — compare o galvanômetro</span>
    </div>
  </div>
  <ul>
    <li><b>Ímã parado = zero tensão.</b> Não importa quão forte é o campo: sem variação, sem indução.</li>
    <li><b>Movimento rápido = tensão maior.</b> O que importa é a <i>taxa de variação</i> do fluxo.</li>
  </ul>
  <div class="key"><span class="t">POR QUE ISSO IMPORTA</span>Todo motor girando também é um gerador: a rotação induz uma tensão contrária (FCEM) que limita a corrente — por isso a corrente de partida é alta e cai com a aceleração. É também o princípio do motor de indução (Módulo 5) e do aquecimento por indução (Módulo 7).</div>
  <div class="navrow"><button class="btn" onclick="go(1)">← Voltar</button><button class="btn primary" onclick="go(3)">Próximo: Motor CC →</button></div>
</section>

<section class="mod" id="m4">
  <div class="eyebrow">${MODS[3].eyebrow}</div><h2>${MODS[3].title}</h2>
  <p>Pegue a espira do Módulo 2 dentro do campo: um lado é empurrado para cima, o outro para baixo → <b>torque</b>, e ela gira. Problema: após meia volta, os lados trocam de posição e a força passaria a girar no sentido contrário — a espira só oscilaria.</p>
  <p>A solução mecânica genial: o <b>comutador</b> — um anel partido em segmentos que gira junto com a espira, tocando <b>escovas</b> fixas de grafite. A cada meia volta, ele <b>inverte a corrente na espira</b> no instante certo, mantendo o torque sempre no mesmo sentido.</p>
  <div class="lab">
    <h3>🧪 Bancada 4 — Motor CC com comutador</h3>
    <canvas id="c4" data-h="300"></canvas>
    <div class="ctrl">
      <label>Tensão aplicada <input type="range" id="c4v" min="0" max="100" value="50"></label>
      <button class="btn" id="c4flip">Inverter polaridade ⇄</button>
      <span class="readout" id="c4r"></span>
    </div>
  </div>
  <ul>
    <li><b>Estator:</b> cria o campo fixo (ímãs permanentes ou bobinas de campo).</li>
    <li><b>Rotor (armadura):</b> bobinas que recebem corrente via escovas + comutador.</li>
    <li><b>Velocidade ∝ tensão</b> aplicada — controle simples e fino. <b>Torque ∝ corrente</b>, alto já na partida.</li>
    <li><b>Inverter rotação:</b> basta inverter a polaridade.</li>
    <li><b>Ponto fraco:</b> escovas e comutador desgastam, faíscam e exigem manutenção.</li>
  </ul>
  <div class="key"><span class="t">EM UMA FRASE</span>O motor CC usa uma chave mecânica rotativa (comutador) para inverter a corrente do rotor a cada meia volta e manter o torque sempre no mesmo sentido.</div>
  <div class="navrow"><button class="btn" onclick="go(2)">← Voltar</button><button class="btn primary" onclick="go(4)">Próximo: Motor CA →</button></div>
</section>

<section class="mod" id="m5">
  <div class="eyebrow">${MODS[4].eyebrow}</div><h2>${MODS[4].title}</h2>
  <p>O motor CA resolve a inversão de forma <b>elegante e sem contato</b>: em vez de inverter a corrente no rotor mecanicamente, ele faz o <b>próprio campo do estator girar</b>.</p>
  <p>Como? Três bobinas fixas, defasadas <b>120° no espaço</b>, alimentadas pelas três fases da rede, defasadas <b>120° no tempo</b>. A soma dos três campos pulsantes é um campo resultante de intensidade constante que <b>gira sozinho</b>, na frequência da rede:</p>
  <div class="lab">
    <h3>🧪 Bancada 5 — Campo girante trifásico ★</h3>
    <canvas id="c5" data-h="320"></canvas>
    <div class="ctrl">
      <label>Frequência da rede <input type="range" id="c5f" min="10" max="100" value="45"></label>
      <button class="btn" id="c5fase">Trocar duas fases ⇄ (inverte rotação)</button>
      <span class="readout" id="c5r"></span>
    </div>
  </div>
  <p><b>Motor de indução (gaiola de esquilo)</b> — o cavalo de batalha da indústria: o rotor é um conjunto de barras de alumínio/cobre curto-circuitadas. O campo girante "varre" as barras → <b>induz corrente nelas (Faraday!)</b> → essa corrente, dentro do campo, sofre força (Lorentz!) → o rotor é arrastado atrás do campo. Sem escovas, sem contato elétrico com o rotor.</p>
  <ul>
    <li><b>Escorregamento (slip):</b> o rotor gira sempre um pouco <i>mais devagar</i> que o campo (2–5%). Se igualasse a velocidade, não haveria variação de fluxo → sem indução → sem torque.</li>
    <li><b>Motor síncrono:</b> o rotor tem campo próprio (ímãs ou excitação CC) e "trava" no campo girante — gira exatamente na velocidade síncrona.</li>
    <li><b>Velocidade ∝ frequência da rede</b> (e nº de polos) — por isso o controle moderno é por <b>inversor de frequência</b>.</li>
    <li><b>Inverter rotação:</b> trocar duas fases entre si.</li>
    <li><b>Monofásico:</b> uma fase só cria campo pulsante → precisa de capacitor + bobina auxiliar para partir.</li>
  </ul>
  <div class="key"><span class="t">EM UMA FRASE</span>O motor de indução combina Oersted, Faraday e Lorentz: o estator cria um campo que gira, esse campo induz correntes no rotor, e essas correntes sofrem força — o rotor persegue o campo para sempre, sem nunca alcançá-lo.</div>
  <div class="navrow"><button class="btn" onclick="go(3)">← Voltar</button><button class="btn primary" onclick="go(5)">Próximo: Universal →</button></div>
</section>

<section class="mod" id="m6">
  <div class="eyebrow">${MODS[5].eyebrow}</div><h2>${MODS[5].title}</h2>
  <p>Lembra do Módulo 2? <b>Invertendo corrente E campo ao mesmo tempo, a força não muda de sentido.</b> O motor universal explora exatamente isso.</p>
  <p>Ele é um motor tipo CC com escovas e comutador, mas com as bobinas de campo (estator) ligadas <b>em série</b> com a armadura (rotor): a mesma corrente passa pelos dois. Quando a rede CA inverte a corrente (120 vezes por segundo em 60 Hz), ela inverte <b>simultaneamente</b> campo e corrente do rotor → o torque continua sempre no mesmo sentido.</p>
  <div class="lab">
    <h3>🧪 Bancada 6 — Por que o torque não inverte</h3>
    <canvas id="c6" data-h="240"></canvas>
    <div class="ctrl">
      <button class="btn primary" id="c6mode">Alimentação: CC</button>
      <span class="readout" id="c6r">Alterne para CA e observe: campo e corrente invertem juntos, o torque permanece</span>
    </div>
  </div>
  <ul>
    <li><b>Funciona em CC e CA</b> — daí "universal".</li>
    <li><b>Altíssima rotação</b> (10.000–30.000 rpm) e alto torque de partida, com tamanho pequeno.</li>
    <li><b>Onde está:</b> furadeiras, esmerilhadeiras, liquidificadores, aspiradores — toda ferramenta manual com escovas.</li>
    <li><b>Ponto fraco:</b> escovas desgastam e faíscam; velocidade varia muito com a carga.</li>
    <li>Estator com núcleo <b>laminado</b> para reduzir perdas por correntes parasitas em CA.</li>
  </ul>
  <div class="key"><span class="t">EM UMA FRASE</span>Campo e armadura em série invertem juntos com a rede CA — como a força depende do <i>produto</i> dos dois, (−)×(−)=(+) e o torque nunca muda de sentido.</div>
  <div class="navrow"><button class="btn" onclick="go(4)">← Voltar</button><button class="btn primary" onclick="go(6)">Próximo: Indução térmica →</button></div>
</section>

<section class="mod" id="m7">
  <div class="eyebrow">${MODS[6].eyebrow}</div><h2>${MODS[6].title}</h2>
  <p>As mesmas correntes induzidas que movem o motor de indução podem ser usadas para <b>aquecer metal</b>. A ideia: uma bobina de cobre (o <b>indutor</b>, refrigerado a água) percorrida por CA de média/alta frequência cria um campo magnético que varia milhares de vezes por segundo. Coloque uma peça metálica dentro desse campo e, por Faraday, surgem nela <b>correntes de Foucault</b> (eddy currents) — correntes que circulam em anéis fechados dentro do próprio metal.</p>
  <p>Essas correntes encontram a resistência elétrica do material e dissipam calor por <b>efeito Joule</b> — o metal aquece <b>por dentro, sem contato e sem chama</b>. Em aços ferromagnéticos há um bônus: a <b>histerese</b> (a "fricção" dos domínios magnéticos invertendo a cada ciclo) também gera calor — até o <b>ponto Curie</b> (~770 °C), quando o aço perde o ferromagnetismo e resta só o efeito Joule.</p>
  <div class="key"><span class="t">O CONCEITO-CHAVE: EFEITO PELICULAR (SKIN EFFECT)</span>Em alta frequência, a corrente induzida se concentra numa <b>casca fina na superfície</b> da peça. Quanto maior a frequência, menor a profundidade de penetração. Isso transforma a frequência num "botão de ajuste" do processo: baixa frequência aquece profundo (fusão, forjamento); alta frequência aquece só a pele (têmpera superficial).</div>
  <div class="lab">
    <h3>🧪 Bancada 7A — Frequência × profundidade de aquecimento</h3>
    <canvas id="c7" data-h="280"></canvas>
    <div class="ctrl">
      <label>Frequência do indutor <input type="range" id="c7f" min="0" max="100" value="20"></label>
      <label>Potência <input type="range" id="c7p" min="10" max="100" value="70"></label>
      <span class="readout" id="c7r"></span>
    </div>
  </div>
  <div class="key"><span class="t">PERGUNTAS DE BANCADA</span>
  <b>1 · A peça pode ficar parada na têmpera?</b> Sim — é a têmpera <i>single-shot</i>: peça estática dentro do indutor, bobina energiza por segundos, depois a ducha de resfriamento. Não precisa de movimento relativo porque, diferente do ímã na bobina, aqui <b>o próprio campo já varia sozinho</b>: a corrente no indutor é alternada, então o fluxo oscila milhares de vezes por segundo com tudo parado. Na prática costuma-se <b>girar a peça</b> (eixos, pinos), mas por <i>uniformidade térmica</i>, não por necessidade eletromagnética. E a frequência não é "variada para induzir" — ela é <b>escolhida fixa</b> conforme a profundidade de camada desejada; a indução acontece pela alternância em si.<br><br>
  <b>2 · Essas correntes são as "parasitas"?</b> Sim: correntes de Foucault = <i>eddy currents</i> = <b>correntes parasitas</b> — o mesmo fenômeno. O nome "parasita" vem de motores e transformadores, onde elas só geram perda e aquecimento indesejado (por isso os núcleos são laminados). No aquecimento por indução, o "defeito" vira o produto.<br><br>
  <b>3 · Como sair de 60 Hz e chegar a 400 kHz?</b> Ninguém "amplia" a frequência da rede — ela é <b>reconstruída</b> por eletrônica de potência, em três estágios: <b>(a) Retificador:</b> os 60 Hz viram corrente contínua. <b>(b) Inversor de alta frequência:</b> chaves semicondutoras (IGBTs até dezenas de kHz; MOSFETs para centenas de kHz) ligam e desligam a CC milhares de vezes por segundo, "fatiando-a" numa nova CA na frequência desejada. <b>(c) Tanque ressonante LC:</b> o indutor + banco de capacitores formam um circuito sintonizado na frequência de trabalho — chavear em ressonância reduz drasticamente as perdas e entrega alta potência à bobina. É o mesmo princípio do inversor de frequência que aciona os motores da planta, só que muito mais rápido e com estágio ressonante. (Antes dos semicondutores: conjuntos motor-gerador e osciladores a válvula — enormes e ineficientes.)</div>
  <p><b>Forno de indução a cadinho (coreless)</b> — fusão de aço e ferro fundido: a bobina envolve um cadinho refratário com a carga metálica. As correntes de Foucault fundem a carga e, de quebra, as forças eletromagnéticas <b>agitam o banho</b> (stirring), homogeneizando composição química e temperatura — ótimo para ligas. Opera tipicamente da frequência de rede até ~1 kHz (peças/banhos grandes pedem penetração profunda). Limpo, rápido, sem eletrodos nem contaminação por combustão — por isso domina fundições e aciarias de precisão.</p>
  <p><b>Anatomia do forno</b> (veja o corte abaixo): a <b>bobina</b> de tubo de cobre refrigerado envolve o <b>cadinho refratário</b> que contém a carga; do lado de fora, <b>núcleos de aço laminado (yokes)</b> confinam o fluxo magnético, blindando a estrutura metálica e melhorando o rendimento. Completam o conjunto o banco de capacitores (ressonância/fator de potência), a estrutura basculante para vazamento e o circuito fechado de água com trocador de calor.</p>
  <p>Um efeito colateral valioso: as forças de Lorentz no banho líquido criam a <b>agitação eletromagnética (stirring)</b> — circulação toroidal que homogeneiza composição e temperatura e ergue o <b>menisco</b> (domo) na superfície. A agitação cresce com a potência e diminui com a raiz da frequência — mais um motivo para fornos de fusão usarem frequência baixa.</p>
  <div class="lab">
    <h3>🧪 Bancada 7B — Forno a cadinho em operação (corte)</h3>
    <canvas id="c7b" data-h="360"></canvas>
    <div class="ctrl">
      <label>Potência <input type="range" id="c7bp" min="10" max="100" value="60"></label>
      <label>Frequência <input type="range" id="c7bf" min="0" max="100" value="25"></label>
      <button class="btn primary" id="c7bon">Desligar forno</button>
      <span class="readout" id="c7br"></span>
    </div>
    <p style="font-size:.8rem;color:var(--txt-dim);margin:10px 0 0">Experimente: potência alta + frequência baixa = fusão rápida e agitação forte (menisco alto). Suba a frequência com o banho líquido e veja a agitação morrer. Desligue o forno e observe o resfriamento pelas perdas.</p>
  </div>
  <p><b>Aquecimento indutivo para tratamento térmico e conformação:</b></p>
  <ul>
    <li><b>Têmpera por indução (superficial):</b> alta frequência (10–400 kHz) aquece só uma camada de 0,5–5 mm acima da austenitização em segundos; o resfriamento imediato (ducha de água/polímero) forma <b>martensita na superfície, mantendo o núcleo tenaz</b>. É o clássico de dentes de engrenagem, pinos, guias, pistas de rolamento e <b>cilindros de laminação</b>. Profundidade de camada controlada pela frequência + tempo + potência.</li>
    <li><b>Scan hardening:</b> para eixos longos, o indutor (ou a peça) se desloca axialmente com o chuveiro de têmpera logo atrás — endurece metros de eixo com camada uniforme.</li>
    <li><b>Revenimento por indução:</b> reaquecimento rápido e controlado a baixa temperatura logo após a têmpera, em linha.</li>
    <li><b>Aquecimento para forjamento:</b> média frequência (0,5–10 kHz) aquece o tarugo inteiro de forma homogênea até ~1200 °C em minutos, com pouca carepa — alimenta prensas e martelos em linha contínua.</li>
    <li><b>Brasagem, aquecimento para montagem por interferência</b> (dilatar anéis/acoplamentos para montagem em eixo) e <b>desmontagem</b> de peças gripadas.</li>
  </ul>
  <p><b>O indutor por dentro:</b> ele conduz centenas a milhares de ampères, e o efeito pelicular também vale para ele — a corrente flui só na superfície do cobre. Por isso o indutor é um <b>tubo oco</b>: o miolo seria cobre morto, e o canal interno vira passagem de <b>água desmineralizada</b> que remove as perdas I²R (sem refrigeração, o cobre recoze e o indutor colapsa em segundos de operação). Pelo <b>efeito de proximidade</b>, a corrente ainda se concentra na face do tubo voltada à peça — exatamente onde interessa. E o <b>gap</b> (distância indutor–peça) é crítico: quanto menor, melhor o acoplamento magnético e o rendimento — por isso indutores são conformados "sob medida" para a geometria da peça.</p>
  <div class="lab">
    <h3>🧪 Bancada 7C — Indutor refrigerado em detalhe</h3>
    <canvas id="c7c" data-h="300"></canvas>

      <button class="btn" id="c7cm">Modo: Aquecimento</button>
      <span class="readout" id="c7cr"></span>
    </div>
    <p style="font-size:.8rem;color:var(--txt-dim);margin:10px 0 0">Experimente: reduza a vazão com potência alta e veja o alarme de ΔT da água. Aumente o gap e observe o acoplamento (e a temperatura da superfície) despencar. Alterne para Quench: o mesmo anel vira chuveiro de têmpera.</p>
  </div>

/* ============ MOTOR DE SIMULAÇÃO (robusto a display:none) ============ */
const CY='#5FD4E8',CU='#D08A4E',NR='#E86A5D',SB='#5D8DE8',TX='#E8E4DC',DIM='#9AA7B8',HT='#FF6B3D';
function arrow(g,x1,y1,x2,y2,c,w){w=w||2;g.strokeStyle=c;g.fillStyle=c;g.lineWidth=w;
  const a=Math.atan2(y2-y1,x2-x1),h=8+w;
  g.beginPath();g.moveTo(x1,y1);g.lineTo(x2,y2);g.stroke();
  g.beginPath();g.moveTo(x2,y2);
  g.lineTo(x2-h*Math.cos(a-.45),y2-h*Math.sin(a-.45));
  g.lineTo(x2-h*Math.cos(a+.45),y2-h*Math.sin(a+.45));
  g.closePath();g.fill();}

function makeSim(id,drawFn){
  const cv=document.getElementById(id);
  if(!cv) return;
  const H=parseInt(cv.dataset.h,10);
  cv.style.height=H+'px';
  const g=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  function frame(){
    const w=cv.clientWidth;
    if(w>0){ // só desenha quando o módulo está visível
      const bw=Math.round(w*dpr),bh=Math.round(H*dpr);
      if(cv.width!==bw||cv.height!==bh){cv.width=bw;cv.height=bh;}
      g.setTransform(dpr,0,0,dpr,0,0);
      g.clearRect(0,0,w,H);
      try{drawFn(g,w,H);}catch(err){console.error(id,err);}
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* --- Bancada 1: campo ao redor do fio --- */
(function(){
  const s={i:.55,dir:1,t:0};
  document.getElementById('c1i').oninput=e=>s.i=e.target.value/100;
  document.getElementById('c1flip').onclick=()=>s.dir*=-1;
  makeSim('c1',function(g,W,H){
    const cx=W/2,cy=H/2-8;
    s.t-=.02*s.dir*(.2+s.i);
    for(let r=26;r<=110;r+=28){
      const alpha=Math.max(.08,s.i*(1-r/160));
      g.strokeStyle='rgba(95,212,232,'+alpha+')';g.lineWidth=1.5;
      g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);g.stroke();
      for(let k=0;k<3;k++){
        const th=s.t+k*Math.PI*2/3+r*.05;
        const x=cx+r*Math.cos(th),y=cy+r*Math.sin(th);
        const tx=Math.sin(th)*s.dir,ty=-Math.cos(th)*s.dir;
        if(s.i>.02)arrow(g,x-tx*6,y-ty*6,x+tx*6,y+ty*6,'rgba(95,212,232,'+Math.min(1,alpha+.35)+')',1.5);
      }
    }
    g.fillStyle=CU;g.beginPath();g.arc(cx,cy,12,0,Math.PI*2);g.fill();
    g.fillStyle='#141414';g.font='bold 14px "Space Grotesk",sans-serif';g.textAlign='center';g.textBaseline='middle';
    g.fillText(s.dir>0?'⊙':'⊗',cx,cy+1);
    g.fillStyle=DIM;g.font='12px "IBM Plex Sans",sans-serif';
    g.fillText(s.dir>0?'corrente saindo da tela (⊙)':'corrente entrando na tela (⊗)',cx,H-14);
    document.getElementById('c1r').textContent='B ∝ I — campo '+(s.i<.15?'fraco':s.i<.6?'moderado':'forte');
  });
})();

/* --- Bancada 3: indução --- */
(function(){
  const s={p:.1,lastP:.1,v:0};
  document.getElementById('c3p').oninput=e=>s.p=e.target.value/100;
  makeSim('c3',function(g,W,H){
    s.v=s.v*.86+(s.p-s.lastP)*40;s.lastP=s.p;
    const coilX=W*.42,mx=44+s.p*(W*.6);
    if(Math.abs(s.v)>.05){g.strokeStyle='rgba(95,212,232,.8)';g.lineWidth=1.5;
      for(let k=0;k<6;k++){g.beginPath();g.ellipse(coilX+k*14,104,13,49,0,0,Math.PI*2);g.stroke();}}
    g.strokeStyle=CU;g.lineWidth=3;
    for(let k=0;k<6;k++){g.beginPath();g.ellipse(coilX+k*14,104,10,44,0,0,Math.PI*2);g.stroke();}
    g.fillStyle=NR;g.fillRect(mx-52,86,52,36);
    g.fillStyle=SB;g.fillRect(mx,86,52,36);
    g.fillStyle='#fff';g.font='bold 14px "Space Grotesk",sans-serif';g.textAlign='center';g.textBaseline='middle';
    g.fillText('S',mx-26,104);g.fillText('N',mx+26,104);
    const gx=W*.5,gy=H-38;
    g.strokeStyle=DIM;g.lineWidth=2;g.beginPath();g.arc(gx,gy,26,Math.PI,0);g.stroke();
    const ang=Math.max(-1.2,Math.min(1.2,s.v));
    const nx=gx+24*Math.sin(ang),ny=gy-24*Math.cos(ang);
    g.strokeStyle=Math.abs(s.v)>.05?CY:DIM;g.lineWidth=2.5;
    g.beginPath();g.moveTo(gx,gy);g.lineTo(nx,ny);g.stroke();
    g.fillStyle=DIM;g.font='11px "IBM Plex Sans",sans-serif';g.textAlign='center';
    g.fillText('galvanômetro (corrente induzida)',gx,gy+16);
    document.getElementById('c3r').textContent=Math.abs(s.v)>.05
      ?('Fluxo variando → tensão induzida '+(Math.abs(s.v)>.5?'ALTA':'baixa')+' · Lenz: a bobina '+(s.v>0?'repele o N que chega':'atrai o N que sai'))
      :'Ímã parado → fluxo constante → tensão ZERO';
  });
})();

/* --- Bancada 5: campo girante --- */
(function(){
  const s={f:.45,seq:1,t:0};
  document.getElementById('c5f').oninput=e=>s.f=e.target.value/100;
  document.getElementById('c5fase').onclick=()=>s.seq*=-1;
  const cols=['#E86A5D','#F2C94C','#5FD4E8'];
  makeSim('c5',function(g,W,H){
    const narrow=W<560;
    const cx=narrow?W/2:W*.34, cy=narrow?128:H/2-8, R=narrow?92:105;
    s.t+=s.f*.05*s.seq;
    g.strokeStyle='#2A3A50';g.lineWidth=14;g.beginPath();g.arc(cx,cy,R,0,Math.PI*2);g.stroke();
    let rx=0,ry=0;
    for(let k=0;k<3;k++){
      const ang=k*2*Math.PI/3-Math.PI/2;
      const val=Math.sin(s.t-k*2*Math.PI/3);
      const bx=cx+R*Math.cos(ang),by=cy+R*Math.sin(ang);
      g.fillStyle=cols[k];g.beginPath();g.arc(bx,by,12,0,Math.PI*2);g.fill();
      g.fillStyle='#141414';g.font='bold 11px "Space Grotesk",sans-serif';g.textAlign='center';g.textBaseline='middle';
      g.fillText('ABC'[k],bx,by+1);
      const L=val*(R*.62);
      if(Math.abs(L)>3)arrow(g,cx,cy,cx+L*Math.cos(ang),cy+L*Math.sin(ang),cols[k]+'99',2);
      rx+=val*Math.cos(ang);ry+=val*Math.sin(ang);
    }
    arrow(g,cx,cy,cx+rx*R*.53,cy+ry*R*.53,TX,4.5);
    g.fillStyle=TX;g.font='bold 12px "Space Grotesk",sans-serif';g.textAlign='center';
    g.fillText('campo resultante',cx,cy+R+20);
    if(!narrow){
      const ox=W*.64,ow=W*.32;
      for(let k=0;k<3;k++){
        const oy=44+k*88;
        g.strokeStyle=cols[k];g.lineWidth=1.8;g.beginPath();
        for(let x=0;x<=ow;x++){
          const ph=s.t-k*2*Math.PI/3-(ow-x)*.05;
          const y=oy+26-Math.sin(ph)*23;
          x===0?g.moveTo(ox+x,y):g.lineTo(ox+x,y);
        }
        g.stroke();
        g.fillStyle=cols[k];g.font='11px "Space Grotesk",sans-serif';g.textAlign='left';
        g.fillText('Fase '+'ABC'[k],ox,oy-6);
      }
    }
    document.getElementById('c5r').textContent='Rotação '+(s.seq>0?'anti-horária':'horária')+' — 3 campos pulsantes → 1 campo girante constante';
  });
})();

/* --- Bancada 6: universal --- */
(function(){
  const s={ac:false,t:0};
  const btn=document.getElementById('c6mode');
  btn.onclick=function(){s.ac=!s.ac;btn.textContent='Alimentação: '+(s.ac?'CA ~':'CC');};
  makeSim('c6',function(g,W,H){
    const cx=W/2,cy=H/2;
    s.t+=.05;
    const sig=s.ac?(Math.sin(s.t*2)>=0?1:-1):1;
    g.fillStyle=sig>0?NR:SB;g.fillRect(38,cy-45,30,90);
    g.fillStyle=sig>0?SB:NR;g.fillRect(W-68,cy-45,30,90);
    g.fillStyle='#fff';g.font='bold 15px "Space Grotesk",sans-serif';g.textAlign='center';g.textBaseline='middle';
    g.fillText(sig>0?'N':'S',53,cy);g.fillText(sig>0?'S':'N',W-53,cy);
    for(let k=-1;k<=1;k++){
      const y=cy+k*26;
      if(sig>0)arrow(g,76,y,W-76,y,'rgba(95,212,232,.3)',1.3);
      else arrow(g,W-76,y,76,y,'rgba(95,212,232,.3)',1.3);
    }
    [[cy-58,1],[cy+58,-1]].forEach(function(pt){
      const y=pt[0],side=pt[1],d=sig*side;
      g.fillStyle=CU;g.beginPath();g.arc(cx,y,11,0,Math.PI*2);g.fill();
      g.fillStyle='#141414';g.font='bold 13px "Space Grotesk",sans-serif';
      g.fillText(d>0?'⊙':'⊗',cx,y+1);
    });
    g.strokeStyle=CU;g.lineWidth=3.5;
    g.beginPath();g.arc(cx,cy,32,-.6,2.1);g.stroke();
    arrow(g,cx+32*Math.cos(2.1),cy+32*Math.sin(2.1),cx+32*Math.cos(2.45),cy+32*Math.sin(2.45),CU,3.5);
    g.fillStyle=CU;g.font='bold 12px "Space Grotesk",sans-serif';g.textAlign='center';
    g.fillText('torque',cx,cy-4);g.fillText('constante',cx,cy+10);
    g.fillStyle=DIM;g.font='11px "IBM Plex Sans",sans-serif';
    g.fillText(s.ac?'CA: campo E corrente invertem JUNTOS (ligação série) → (−)×(−)=(+)':'CC: campo e corrente fixos',cx,H-10);
  });
})();

/* --- Bancada 7: aquecimento por indução --- */
(function(){
  const s={f:.2,p:.7,t:0};
  document.getElementById('c7f').oninput=e=>s.f=e.target.value/100;
  document.getElementById('c7p').oninput=e=>s.p=e.target.value/100;
  makeSim('c7',function(g,W,H){
    const cx=W/2,cy=H/2-10;
    s.t+=.06+s.f*.12;
    const pieceW=Math.min(360,W-140),pieceH=88;
    const px=cx-pieceW/2,py=cy-pieceH/2;
    // profundidade de penetração: inversa à frequência
    const depth=6+(1-s.f)*(pieceH/2-8);
    // peça (eixo em corte)
    g.fillStyle='#3A4657';g.fillRect(px,py,pieceW,pieceH);
    // camada aquecida (superfície superior e inferior)
    const heat=s.p;
    const grd1=g.createLinearGradient(0,py,0,py+depth);
    grd1.addColorStop(0,'rgba(255,107,61,'+(.85*heat)+')');
    grd1.addColorStop(1,'rgba(255,107,61,0)');
    g.fillStyle=grd1;g.fillRect(px,py,pieceW,depth);
    const grd2=g.createLinearGradient(0,py+pieceH,0,py+pieceH-depth);
    grd2.addColorStop(0,'rgba(255,107,61,'+(.85*heat)+')');
    grd2.addColorStop(1,'rgba(255,107,61,0)');
    g.fillStyle=grd2;g.fillRect(px,py+pieceH-depth,pieceW,depth);
    // correntes de Foucault (tracejadas na camada)
    g.setLineDash([6,5]);g.lineDashOffset=-s.t*20;
    g.strokeStyle='rgba(95,212,232,'+(.4+.5*heat)+')';g.lineWidth=1.6;
    g.strokeRect(px+14,py+4,pieceW-28,Math.max(4,depth-6));
    g.lineDashOffset=s.t*20;
    g.strokeRect(px+14,py+pieceH-Math.max(8,depth-2),pieceW-28,Math.max(4,depth-6));
    g.setLineDash([]);
    // espiras do indutor (corte: em cima ⊗/⊙ alternando com a CA)
    const alt=Math.sin(s.t*3)>=0?1:-1;
    const nCoil=6,gap=pieceW/(nCoil-1);
    for(let k=0;k<nCoil;k++){
      const x=px+k*gap;
      [[py-26,alt],[py+pieceH+26,-alt]].forEach(function(c){
        g.fillStyle=CU;g.beginPath();g.arc(x,c[0],10,0,Math.PI*2);g.fill();
        g.fillStyle='#141414';g.font='bold 12px "Space Grotesk",sans-serif';g.textAlign='center';g.textBaseline='middle';
        g.fillText(c[1]>0?'⊙':'⊗',x,c[0]+1);
      });
    }
    g.fillStyle=DIM;g.font='11px "IBM Plex Sans",sans-serif';g.textAlign='center';
    g.fillText('indutor de cobre (CA, refrigerado a água) — símbolos alternam com a rede',cx,py-44);
    g.fillText('peça de aço em corte · camada laranja = zona aquecida · tracejado ciano = correntes de Foucault',cx,H-12);
    // régua de profundidade
    g.strokeStyle=TX;g.lineWidth=1.5;
    g.beginPath();g.moveTo(px+pieceW+16,py);g.lineTo(px+pieceW+16,py+depth);g.stroke();
    g.beginPath();g.moveTo(px+pieceW+11,py);g.lineTo(px+pieceW+21,py);g.stroke();
    g.beginPath();g.moveTo(px+pieceW+11,py+depth);g.lineTo(px+pieceW+21,py+depth);g.stroke();
    g.fillStyle=TX;g.font='11px "Space Grotesk",sans-serif';g.textAlign='left';
    g.fillText('δ',px+pieceW+26,py+depth/2);
    const modo=s.f<.3?'BAIXA freq → penetração PROFUNDA (fusão / forjamento)':s.f<.65?'MÉDIA freq → camada média (forja, têmpera espessa)':'ALTA freq → casca FINA (têmpera superficial)';
    document.getElementById('c7r').textContent=modo;
  });
})();

/* --- Bancada 7B: forno a cadinho em operação --- */
(function(){
  const s={on:true,p:.6,f:.25,T:25,t:0,parts:[]};
  for(let i=0;i<28;i++)s.parts.push({ph:Math.random()*6.28,q:i%4});
  document.getElementById('c7bp').oninput=e=>s.p=e.target.value/100;
  document.getElementById('c7bf').oninput=e=>s.f=e.target.value/100;
  const bon=document.getElementById('c7bon');
  bon.onclick=function(){s.on=!s.on;bon.textContent=s.on?'Desligar forno':'Ligar forno';};
  function tempColor(T){
    if(T<500)return'#3A4657';
    if(T<800)return'#6E3B34';
    if(T<1100)return'#B0402A';
    if(T<1400)return'#E8622F';
    if(T<1538)return'#FF9438';
    return'#FFD25A';
  }
  makeSim('c7b',function(g,W,H){
    s.t+=.016;
    // modelo térmico simples: entrada ∝ potência, perda ∝ (T - ambiente)
    const heatIn=s.on?s.p*11:0;
    const loss=(s.T-25)*.004;
    s.T=Math.max(25,Math.min(1750,s.T+(heatIn-loss)*.12));
    const liquid=s.T>1538?1:s.T>1450?(s.T-1450)/88:0;
    const stir=s.on?s.p/(0.35+Math.sqrt(s.f*10+0.5))*liquid:0;

    const cw=Math.min(280,W-180),ch=180;
    const cx=W/2,px=cx-cw/2,py=64;
    // yokes de aço
    g.fillStyle='#232E40';
    g.fillRect(px-58,py-8,16,ch+16);g.fillRect(px+cw+42,py-8,16,ch+16);
    // cadinho refratário
    g.fillStyle='#7A5C42';
    g.fillRect(px-16,py-10,cw+32,ch+26);
    // carga / banho com menisco
    const dome=stir*16;
    g.fillStyle=tempColor(s.T);
    g.beginPath();
    g.moveTo(px,py+ch);g.lineTo(px,py+18);
    g.quadraticCurveTo(cx,py+18-dome*2,px+cw,py+18);
    g.lineTo(px+cw,py+ch);g.closePath();g.fill();
    if(liquid>0){g.fillStyle='rgba(255,240,190,'+(.15*liquid)+')';g.fillRect(px+4,py+20,cw-8,18);}
    // partículas de agitação: 4 vórtices (circulação toroidal em corte)
    if(stir>.02){
      g.fillStyle='rgba(255,250,220,.85)';
      s.parts.forEach(function(pp){
        pp.ph+=.02+stir*.06;
        const qx=pp.q%2===0?cx-cw*.24:cx+cw*.24;
        const qy=pp.q<2?py+62:py+ch-42;
        const dir=pp.q%2===0?1:-1;
        const x=qx+Math.cos(pp.ph*dir)*cw*.17;
        const y=qy+Math.sin(pp.ph*dir)*30;
        g.beginPath();g.arc(x,y,2,0,6.28);g.fill();
      });
    }
    // bobina: tubo de cobre (círculo) com água (centro azul)
    for(let k=0;k<6;k++){
      const y=py+8+k*((ch+8)/5);
      [px-34,px+cw+34].forEach(function(bx){
        g.fillStyle=CU;g.beginPath();g.arc(bx,y,10,0,6.28);g.fill();
        g.fillStyle='#4FA8D8';g.beginPath();g.arc(bx,y,4.5,0,6.28);g.fill();
      });
    }
    // legendas
    g.fillStyle=DIM;g.font='11px "IBM Plex Sans",sans-serif';g.textAlign='center';
    g.fillText('yokes de aço laminado (blindagem do fluxo)',cx,py-24);
    g.fillText('bobina: tubo de cobre com água (azul) · marrom = refratário do cadinho',cx,py+ch+42);
    g.fillText('pontos claros = agitação eletromagnética (4 vórtices) · domo central = menisco',cx,py+ch+58);
    // estado térmico
    const estado=s.T<770?'sólido · ferromagnético (Foucault + histerese)':s.T<1450?'sólido · acima do Curie ~770 °C (só Foucault)':s.T<1538?'início de fusão':'banho líquido';
    g.fillStyle=TX;g.font='bold 13px "Space Grotesk",sans-serif';
    g.fillText(Math.round(s.T)+' °C — '+estado,cx,28);
    document.getElementById('c7br').textContent='Agitação: '+(stir<.05?'—':stir<.5?'suave':stir<1?'forte':'muito forte')+(liquid>0&&s.f>.6?' · dica: fusão pede frequência baixa':'');
  });
})();

/* --- Bancada 7C: indutor refrigerado em detalhe --- */
(function(){
  const s={p:.6,q:.6,gap:.3,quench:false,t:0,shaftT:25};
  document.getElementById('c7cp').oninput=e=>s.p=e.target.value/100;
  document.getElementById('c7cq').oninput=e=>s.q=e.target.value/100;
  document.getElementById('c7cg').oninput=e=>s.gap=e.target.value/100;
  const bm=document.getElementById('c7cm');
  bm.onclick=function(){s.quench=!s.quench;bm.textContent='Modo: '+(s.quench?'Quench (resfriar)':'Aquecimento');};
  makeSim('c7c',function(g,W,H){
    s.t+=.03;
    const coup=1/(1+s.gap*2.2);
    const target=s.quench?25:200+s.p*coup*900;
    s.shaftT+=(target-s.shaftT)*(s.quench?.06:.02);
    const dT=Math.round(4+s.p*30/(0.25+s.q));
    const alarm=dT>30;

    // ---- esquerda: corte do tubo de cobre ----
    const lx=Math.max(92,W*.22),ly=H/2-4;
    g.fillStyle=CU;g.beginPath();g.arc(lx,ly,50,0,6.28);g.fill();
    g.fillStyle='#4FA8D8';g.beginPath();g.arc(lx,ly,28,0,6.28);g.fill();
    // fluxo de água animado
    g.setLineDash([7,6]);g.lineDashOffset=-s.t*40*(s.q+.2)*2;
    g.strokeStyle='rgba(230,246,255,.85)';g.lineWidth=2;
    g.beginPath();g.arc(lx,ly,18,0,6.28);g.stroke();
    g.setLineDash([]);
    // pele de corrente na face voltada à peça (direita)
    g.strokeStyle='#FFD25A';g.lineWidth=5;
    g.beginPath();g.arc(lx,ly,47,-1.1,1.1);g.stroke();
    if(alarm){g.strokeStyle='#EB5757';g.lineWidth=3;g.beginPath();g.arc(lx,ly,55,0,6.28);g.stroke();}
    g.fillStyle='#0A2A3A';g.font='bold 11px "Space Grotesk",sans-serif';g.textAlign='center';g.textBaseline='middle';
    g.fillText('água',lx,ly);
    g.fillStyle=DIM;g.font='11px "IBM Plex Sans",sans-serif';
    g.fillText('corte do tubo de cobre oco',lx,ly+70);
    g.fillText('amarelo = corrente na "pele",',lx,ly+84);
    g.fillText('na face voltada à peça',lx,ly+98);

    // ---- direita: indutor anelar em torno de um eixo (vista de topo) ----
    const rx=W*.68,ry=H/2-4;
    const shaftR=34,ringR=shaftR+10+s.gap*26;
    // eixo
    g.fillStyle='#3A4657';g.beginPath();g.arc(rx,ry,shaftR,0,6.28);g.fill();
    // brilho de aquecimento superficial
    const glow=Math.max(0,Math.min(1,(s.shaftT-100)/800));
    if(glow>.02){g.strokeStyle='rgba(255,'+Math.round(150-60*glow)+',60,'+(.9*glow)+')';g.lineWidth=6;g.beginPath();g.arc(rx,ry,shaftR-3,0,6.28);g.stroke();}
    // anel indutor
    g.strokeStyle=alarm?'#EB5757':CU;g.lineWidth=12;
    g.beginPath();g.arc(rx,ry,ringR,0.25,6.03);g.stroke();
    // canal de água no anel
    g.setLineDash([6,6]);g.lineDashOffset=s.t*30*(s.q+.2)*2;
    g.strokeStyle='#4FA8D8';g.lineWidth=3;
    g.beginPath();g.arc(rx,ry,ringR,0.3,5.98);g.stroke();g.setLineDash([]);
    // chuveiro de quench
    if(s.quench){
      g.strokeStyle='rgba(95,212,232,.8)';g.lineWidth=1.5;
      for(let k=0;k<10;k++){
        const a=k/10*6.28+Math.sin(s.t*3)*.05;
        g.beginPath();
        g.moveTo(rx+(ringR-8)*Math.cos(a),ry+(ringR-8)*Math.sin(a));
        g.lineTo(rx+(shaftR+2)*Math.cos(a),ry+(shaftR+2)*Math.sin(a));
        g.stroke();
      }
    }
    g.fillStyle=DIM;g.textAlign='center';g.font='11px "IBM Plex Sans",sans-serif';g.textBaseline='alphabetic';
    g.fillText('indutor anelar em torno do eixo (vista de topo)',rx,ry+ringR+26);
    g.fillText(s.quench?'furos internos viram chuveiro de têmpera':'gap menor = acoplamento melhor',rx,ry+ringR+40);
    g.fillStyle=TX;g.font='bold 12px "Space Grotesk",sans-serif';
    g.fillText('acoplamento ≈ '+Math.round(coup*100)+'% · superfície ≈ '+Math.round(s.shaftT)+' °C',rx,26);
    document.getElementById('c7cr').textContent='ΔT da água: '+dT+' °C '+(alarm?'⚠ ALARME: vazão insuficiente — risco de vapor no canal e recozimento do cobre':'· refrigeração OK');
  });
})();

/* ============ QUIZ ============ */
const QUESTIONS=[
 {q:'Um fio percorrido por corrente cria ao seu redor…',
  o:['Um campo elétrico radial','Linhas de campo magnético circulares','Nada, se o fio for de cobre','Campo apenas nas extremidades'],a:1,
  e:'Oersted, 1820: corrente cria campo magnético em círculos concêntricos ao redor do condutor (regra da mão direita).'},
 {q:'A força sobre um condutor com corrente dentro de um campo magnético inverte de sentido quando…',
  o:['Invertemos corrente E campo ao mesmo tempo','Aumentamos a corrente','Invertemos SÓ a corrente ou SÓ o campo','Aquecemos o condutor'],a:2,
  e:'Invertendo apenas um dos dois, F inverte. Invertendo os dois, F mantém o sentido — princípio do motor universal.'},
 {q:'Segundo Faraday, para induzir tensão numa bobina é preciso…',
  o:['Um campo magnético muito forte, mesmo parado','Variação do fluxo magnético através da bobina','Um núcleo de alumínio','Corrente contínua no primário sempre'],a:1,
  e:'Campo parado não induz nada, por mais forte que seja. O que induz tensão é a TAXA DE VARIAÇÃO do fluxo.'},
 {q:'A função do comutador no motor CC é…',
  o:['Reduzir o atrito do eixo','Refrigerar as escovas','Inverter a corrente na armadura a cada meia volta','Aumentar a tensão da fonte'],a:2,
  e:'Sem o comutador, o torque inverteria a cada meia volta e a espira só oscilaria. Ele mantém o torque no mesmo sentido.'},
 {q:'O campo girante do motor CA trifásico surge porque…',
  o:['O rotor tem ímãs que giram o campo','3 bobinas defasadas 120° no espaço recebem correntes defasadas 120° no tempo','O estator gira mecanicamente','A frequência da rede é sempre 60 Hz'],a:1,
  e:'Defasagem espacial (120°) + defasagem temporal (120°) = campo resultante constante que gira sozinho.'},
 {q:'Por que o motor de indução NUNCA atinge a velocidade síncrona?',
  o:['Por causa do atrito nos rolamentos apenas','Porque o inversor limita','Sem escorregamento não há variação de fluxo → sem corrente induzida → sem torque','Porque as barras do rotor são de alumínio'],a:2,
  e:'O escorregamento é essencial: é a diferença de velocidade que faz o campo "varrer" as barras e induzir corrente.'},
 {q:'Para inverter a rotação de um motor de indução trifásico, basta…',
  o:['Inverter a polaridade da fonte','Trocar duas fases entre si','Trocar as escovas de lado','Reduzir a frequência à metade'],a:1,
  e:'Trocar duas fases inverte o sentido do campo girante — e o rotor segue o campo.'},
 {q:'O motor universal funciona tanto em CC quanto em CA porque…',
  o:['Tem retificador interno','Usa ímãs permanentes no estator','Campo e armadura em série invertem juntos, mantendo o torque','O comutador filtra a corrente alternada'],a:2,
  e:'F depende do produto campo × corrente. Como ambos invertem simultaneamente na rede CA, o produto (e o torque) não muda de sinal.'},
 {q:'No forno de indução, o metal da carga aquece porque…',
  o:['A bobina de cobre esquenta e transfere calor por contato','O campo variável induz correntes de Foucault na carga, que dissipam calor por efeito Joule','Há um arco elétrico entre bobina e carga','O refratário do cadinho é aquecido por resistências'],a:1,
  e:'É Faraday aplicado à metalurgia: campo variável → correntes induzidas dentro do próprio metal → aquecimento interno, sem contato e sem chama. (Arco elétrico é o forno EAF, outro princípio.)'},
 {q:'Na têmpera por indução, aumentar a frequência do indutor faz a camada endurecida ficar…',
  o:['Mais profunda','Mais fina (efeito pelicular concentra a corrente na superfície)','Igual — frequência não influencia','Mais macia'],a:1,
  e:'Efeito pelicular: quanto maior a frequência, mais a corrente induzida se concentra na "pele" da peça. Alta frequência = camada martensítica fina e núcleo tenaz.'},
 {q:'Um equipamento de têmpera por indução opera a 200 kHz alimentado pela rede de 60 Hz. Como essa frequência é obtida?',
  o:['Um transformador elevador multiplica a frequência','Retificador (CA→CC) + inversor com chaves semicondutoras + circuito ressonante LC','A bobina gira mecanicamente a alta rotação','Capacitores em série aceleram a corrente da rede'],a:1,
  e:'Transformador muda tensão, não frequência. O caminho é: rede 60 Hz → CC (retificador) → chaveamento rápido por IGBT/MOSFET (inversor) → tanque ressonante LC sintonizado, que entrega alta potência à bobina com baixas perdas.'},
 {q:'Por que o indutor é feito de tubo de cobre OCO com água circulando por dentro?',

  e:'A corrente de alta frequência ocupa só a "pele" do condutor, então o centro maciço não conduziria nada útil. O canal vira circuito de água desmineralizada: sem essa refrigeração, o cobre recoze e o indutor falha em segundos.'},
];
let answered=0,scoreN=0;
function buildQuiz(){
  answered=0;scoreN=0;document.getElementById('score').textContent='';
  const qz=document.getElementById('quiz');qz.innerHTML='';
  QUESTIONS.forEach(function(Q,qi){
    const d=document.createElement('div');d.className='quiz-q';
    d.innerHTML='<div class="qt">'+(qi+1)+'. '+Q.q+'</div>';
    Q.o.forEach(function(op,oi){
      const b=document.createElement('button');b.className='opt';b.textContent=op;
      b.onclick=function(){
        if(d.dataset.done)return;d.dataset.done=1;
        Array.prototype.forEach.call(d.querySelectorAll('.opt'),function(x,xi){
          if(xi===Q.a)x.classList.add('correct');
          else if(xi===oi)x.classList.add('wrong');
          x.style.cursor='default';
        });
        d.querySelector('.expl').style.display='block';
        if(oi===Q.a)scoreN++;
        answered++;
        if(answered===QUESTIONS.length){
          document.getElementById('score').textContent='Resultado: '+scoreN+'/'+QUESTIONS.length+' — '+
            (scoreN>=11?'Excelente! Eletromagnetismo relembrado. ⚡':scoreN>=7?'Bom! Revise os módulos das questões erradas.':'Vale revisitar os módulos 1–3 antes das máquinas.');
        }
      };
      d.appendChild(b);
    });
    const e=document.createElement('div');e.className='expl';e.textContent='💡 '+Q.e;d.appendChild(e);
    qz.appendChild(d);
  });
}
buildQuiz();
document.getElementById('qreset').onclick=buildQuiz;
go(0);
